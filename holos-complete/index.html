<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#0A0A0A" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>HOLOS — AR Commerce Marketplace</title>

  <!-- Web Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500&display=swap" />

  <!-- three.js for in-browser model normalisation (bakes real-world size into .glb + .usdz) -->
  <script type="importmap">
  { "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }}
  </script>
  <script type="module" src="scripts/model-baker.js"></script>

  <!-- model-viewer for real AR -->
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

  <!-- Design Tokens -->
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/components.css">
  <link rel="stylesheet" href="styles/marketplace.css">
  <link rel="stylesheet" href="styles/desktop.css" />
  <link rel="stylesheet" href="styles/shop-layouts.css" />
  <link rel="stylesheet" href="styles/animations.css" />
</head>
<body>
  <!-- App mounts here -->
  <div id="app"></div>

  <!-- Dev log panel -->
  <button class="log-toggle" id="log-toggle" aria-label="toggle logs" title="View log">LOG</button>
  <div class="log-panel" id="log-panel" aria-hidden="true">
    <div class="log-panel-head">
      <span class="log-panel-title">Event log</span>
      <button class="log-close" onclick="document.getElementById('log-panel').classList.remove('open')" aria-label="close">✕</button>
    </div>
    <div id="log-content"></div>
  </div>

  <!-- Core scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="scripts/logger.js"></script>
  <script src="scripts/supabase-client.js"></script>
  <script src="scripts/storage.js"></script>
  <script src="scripts/db.js"></script>
  <script src="scripts/icons.js"></script>
  <script src="scripts/taxonomy.js"></script>
  <script src="scripts/state.js"></script>
  <script src="scripts/state-bridge.js"></script>
  <script src="scripts/router.js"></script>
  <script src="scripts/product-svgs.js"></script>
  <script src="scripts/field-renderer.js"></script>
  <script src="scripts/model-fit.js"></script>
  <script src="scripts/model-audit.js"></script>
  <script src="scripts/size-editor.js"></script>
  <script src="scripts/reveal.js"></script>
  <script src="scripts/hero-carousel.js"></script>
  <script src="scripts/locale.js"></script>
  <script src="scripts/i18n.js"></script>
  <script src="scripts/lang-switcher.js"></script>
  <script src="scripts/qr-generator.js"></script>
  <script src="scripts/themes.js"></script>
  <script src="scripts/shop-layouts.js"></script>

  <!-- Launcher -->
  <script src="screens/onboarding.js"></script>
  <script src="screens/launcher.js"></script>

  <!-- Customer (marketplace) -->
  <script src="screens/customer/marketplace.js"></script>
  <script src="screens/customer/login.js"></script>
  <script src="screens/customer/signup.js"></script>
  <script src="screens/customer/shop.js"></script>
  <script src="screens/customer/shop-ar.js"></script>
  <script src="screens/customer/product.js"></script>
  <script src="screens/customer/room-ar.js"></script>
  <script src="screens/customer/tryon.js"></script>
  <script src="screens/customer/favorites.js"></script>
  <script src="screens/customer/account.js"></script>
  <script src="screens/customer/scan.js"></script>

  <!-- Shopkeeper -->
  <script src="screens/shopkeeper/signup.js"></script>
  <script src="screens/shopkeeper/login.js"></script>
  <script src="screens/shopkeeper/home.js"></script>
  <script src="screens/shopkeeper/add-product.js"></script>
  <script src="screens/shopkeeper/settings.js"></script>
  <script src="screens/shopkeeper/themes.js"></script>
  <script src="screens/shopkeeper/customize.js"></script>
  <script src="screens/shopkeeper/edit-product.js"></script>

  <!-- Admin -->
  <script src="screens/admin/login.js"></script>
  <script src="screens/admin/home.js"></script>
  <script src="screens/admin/shop-detail.js"></script>
  <script src="screens/admin/queues.js"></script>
  <script src="screens/admin/banners.js"></script>
  <script src="screens/messaging.js"></script>
  <script src="screens/admin/analytics.js"></script>
  <script src="screens/admin/reviews.js"></script>

  <!-- Bootstrap -->
  <script>
    window.HOLOS_BUILD = '2026-06-21-v24';
    (async function bootstrap() {
      console.log('%c[HOLOS] build ' + window.HOLOS_BUILD, 'color:#8B6F47;font-weight:700');
      log('Boot', 'HOLOS marketplace starting · build ' + window.HOLOS_BUILD);

      const toggle = document.getElementById('log-toggle');
      const panel = document.getElementById('log-panel');
      Logger.attach(document.getElementById('log-content'));
      toggle.addEventListener('click', () => {
        const open = panel.classList.toggle('open');
        panel.setAttribute('aria-hidden', !open);
      });

      // Show a quick loading screen while we hydrate
      const mount = document.getElementById('app');
      mount.innerHTML = `
        <div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--bg);">
          <div style="font-size:0.75rem;font-weight:700;letter-spacing:0.24em;color:var(--ink);margin-bottom:1.5rem;">HOLOS</div>
          <div style="width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.8s linear infinite;"></div>
          <div id="boot-status" style="margin-top:1rem;font-size:0.8rem;color:var(--ink-dim);">Connecting...</div>
          <style>@keyframes spin{to{transform:rotate(360deg);}}</style>
        </div>`;

      const setStatus = (t) => { const s = document.getElementById('boot-status'); if (s) s.textContent = t; };

      // 1. Init Supabase client
      setStatus('Connecting to database...');
      if (!DB.init()) {
        setStatus('Failed to connect. Check config.');
        log('Boot', 'DB init failed', 'error');
        return;
      }

      // 2. Hydrate cache from DB
      setStatus('Loading marketplace...');
      const ok = await StateBridge.hydrate();
      if (!ok) {
        setStatus('Failed to load data. Check console.');
        return;
      }

      // 3. Start router
      Router.init(mount);
      log('Boot', 'ready · build ' + window.HOLOS_BUILD);
    })();
  </script>
</body>
</html>
